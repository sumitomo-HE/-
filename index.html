              <button type="button" style={{...S.rangeBtn,...(gyomuRange==="custom"?S.rangeBtnActive:{})}} onClick={()=>setGyomuRange("custom")}>期間指定</button>
            </div>
            {gyomuRange==="week"&&(
              <div style={S.weekNav}>
                <button type="button" style={S.calNavBtn} onClick={()=>setGyomuWeekOffset(o=>o-1)}>‹</button>
                <span style={{fontSize:13,fontWeight:600,color:"#1c1c1e"}}>
                  {getWeekRange(gyomuWeekOffset).start} 〜 {getWeekRange(gyomuWeekOffset).end}
                </span>
                <button type="button" style={S.calNavBtn} onClick={()=>setGyomuWeekOffset(o=>o+1)}>›</button>
              </div>
            )}
            {gyomuRange==="custom"&&(
              <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
                <input style={{...S.formInput,flex:1,fontSize:13}} type="date" value={gyomuCustomStart} onChange={e=>setGyomuCustomStart(e.target.value)}/>
                <span style={{fontSize:13,color:"#8e8e93"}}>〜</span>
                <input style={{...S.formInput,flex:1,fontSize:13}} type="date" value={gyomuCustomEnd} onChange={e=>setGyomuCustomEnd(e.target.value)}/>
              </div>
            )}

            {/* 実績テーブル */}
            <div style={S.gyomuTable}>
              <div style={S.gyomuTableHeader}>
                <span style={{flex:2}}>日付・物件</span>
                <span style={{flex:1,textAlign:"center"}}>業者</span>
                <span style={{flex:1,textAlign:"center"}}>人数</span>
                <span style={{flex:1,textAlign:"right"}}>金額</span>
              </div>
              {gyomuData.map((row,i)=>(
                <GyomuRow key={i} row={row} i={i} vendors={vendors} data={data} updateData={updateData} showToast={showToast} dayOfWeek={dayOfWeek} vendorColor={vendorColor}/>
              ))}
              {gyomuData.length===0&&<div style={{padding:"20px",textAlign:"center",color:"#aeaeb2",fontSize:14}}>該当期間に開示済みの実績がありません</div>}
            </div>

            {/* 合計 */}
            {gyomuData.length>0&&(
              <div style={S.gyomuTotal}>
                <span>合計</span>
                <span style={{fontWeight:700,fontSize:18}}>¥{gyomuTotal.toLocaleString()}</span>
              </div>
            )}

            {/* 業者別集計 */}
            {gyomuData.length>0&&(
              <div style={{marginTop:12}}>
                <div style={S.sectionLabel}>業者別集計</div>
                {vendors.map(v=>{
                  const rows=gyomuData.filter(r=>r.vendor===v);
                  if(rows.length===0) return null;
                  const total=rows.reduce((s,r)=>s+r.total,0);
                  const count=rows.reduce((s,r)=>s+r.count,0);
                  return (
                    <div key={v} style={{...S.vendorCard,borderTopColor:vendorColor(v,vendors),padding:"10px 14px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{...S.vendorName,color:vendorColor(v,vendors),fontSize:14}}>{v}</div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:12,color:"#8e8e93"}}>{rows.length}件　{count}人</div>
                          <div style={{fontSize:16,fontWeight:700}}>¥{total.toLocaleString()}</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── 業務モード：発注一覧 ── */}
        {view==="order"&&role==="業務"&&(
          <div>
            <button type="button" style={S.refreshBtn} onClick={()=>pullFromCloud(binId)} disabled={syncing}>
              {syncing?"取得中…":"↻ 最新データを取得"}
            </button>
            <OrderListView
              data={data}
              updateData={updateData}
              vendors={vendors}
              vendorColor={vendorColor}
              vendorBg={vendorBg}
              dayOfWeek={dayOfWeek}
              showToast={showToast}
            />
          </div>
        )}

        {/* ── 業務モード：単価設定 ── */}
        {view==="settings"&&role==="業務"&&(
          <div>
            {/* 業者ごとのカテゴリ管理＋単価設定 */}
            <div style={S.sectionLabel}>業者・工程別 単価設定（1人あたり）</div>
            {vendors.map(v=>{
              const priceMap=(data.unitPrices||{})[v]||{};
              const cats=getVendorCategories(vendorPriceCategories,v);
              const isOpen=selectedCatVendor===v;
              return (
                <div key={v} style={{...S.vendorCard,borderTopColor:vendorColor(v,vendors)}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{...S.vendorName,color:vendorColor(v,vendors)}}>{v}</div>
                    <button type="button" style={isOpen?S.editModeOnBtn:S.editModeOffBtn} onClick={()=>{ setSelectedCatVendor(isOpen?null:v); setEditingCatIdx(null); setNewCatName(""); }}>
                      {isOpen?"閉じる":"⚙️ カテゴリ"}
                    </button>
                  </div>

                  {/* カテゴリ編集パネル */}
                  {isOpen&&(
                    <div style={{background:"#f9f9f9",borderRadius:8,padding:"10px",margin:"8px 0",border:"1px solid #e5e5ea"}}>
                      <div style={{fontSize:11,color:"#8e8e93",marginBottom:8}}>このカテゴリは{v}専用です</div>
                      {cats.map((cat,idx)=>(
                        <div key={idx} style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                          {editingCatIdx===idx ? (
                            <>
                              <input style={{...S.formInput,flex:1,fontSize:12,padding:"4px 7px"}} value={editingCatName} onChange={e=>setEditingCatName(e.target.value)}/>
                              <button type="button" style={{...S.btnPrimary,padding:"4px 8px",fontSize:11}} onClick={()=>renamePriceCategory(v,idx,editingCatName)}>確定</button>
                              <button type="button" style={{...S.btnGhost,padding:"4px 6px",fontSize:11}} onClick={()=>{ setEditingCatIdx(null); setEditingCatName(""); }}>×</button>
                            </>
                          ):(
                            <>
                              <span style={{flex:1,fontSize:13,fontWeight:600}}>{cat}</span>
                              <button type="button" style={{fontSize:11,color:"#007aff",background:"none",border:"none",cursor:"pointer"}} onClick={()=>{ setEditingCatIdx(idx); setEditingCatName(cat); }}>編集</button>
                              <button type="button" style={S.delBtn} onClick={()=>deletePriceCategory(v,idx)}>✕</button>
                            </>
                          )}
                        </div>
                      ))}
                      <div style={{display:"flex",gap:6,marginTop:8}}>
                        <input style={{...S.formInput,flex:1,fontSize:12}} value={newCatName} onChange={e=>setNewCatName(e.target.value)} placeholder="カテゴリを追加"/>
                        <button type="button" style={{...S.btnPrimary,padding:"6px 10px",fontSize:12}} onClick={()=>addPriceCategory(v)}>追加</button>
                      </div>
                    </div>
                  )}

                  {/* 単価入力 */}
                  {cats.map(cat=>{
                    const current=priceMap[cat]||0;
                    const key=`${v}_${cat}`;
                    return (
                      <div key={cat} style={{display:"flex",alignItems:"center",gap:8,marginTop:8,paddingTop:8,borderTop:"0.5px solid #f2f2f7"}}>
                        <span style={{fontSize:12,fontWeight:600,color:"#3c3c43",minWidth:52}}>{cat}</span>
                        <span style={{fontSize:11,color:"#8e8e93",minWidth:52}}>¥{current.toLocaleString()}</span>
                        <input style={{...S.formInput,flex:1,fontSize:13,padding:"6px 8px"}} type="number" placeholder="単価"
                          value={editingPrice[key]||""} onChange={e=>setEditingPrice(p=>({...p,[key]:e.target.value}))}/>
                        <button type="button" style={{...S.btnPrimary,padding:"6px 10px",fontSize:12}} onClick={()=>{
                          const prices=data.unitPrices||{};
                          const vmap=prices[v]||{};
                          updateData({...data, unitPrices:{...prices,[v]:{...vmap,[cat]:Number(editingPrice[key]||0)}}});
                          setEditingPrice(p=>({...p,[key]:""}));
                          showToast(`${v} ${cat}の単価を保存しました`);
                        }}>保存</button>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}

      </main>
      {toast&&<div style={{...S.toast,background:toastType==="err"?"#ff3b30":"#1c1c1e"}}>{toast}</div>}
    </div>
  );
}

// ── メンバー管理コンポーネント ──────────────────
function MemberManager({ vendorId, members, onAdd, onDelete }) {
  const [newName, setNewName] = useState("");
  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input style={{...S.formInput,flex:1}} value={newName} onChange={e=>setNewName(e.target.value)} placeholder="メンバー名を入力"/>
        <button type="button" style={S.btnPrimary} onClick={()=>{ onAdd(newName); setNewName(""); }}>追加</button>
      </div>
      {members.length===0&&<div style={S.empty}>メンバー未登録</div>}
      {members.map(m=>(
        <div key={m} style={{...S.reqCard,borderLeftColor:"#007aff",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:15,fontWeight:600,color:"#1c1c1e"}}>👤 {m}</span>
          <button type="button" style={S.delBtn} onClick={()=>onDelete(m)}>✕</button>
        </div>
      ))}
    </div>
  );
}

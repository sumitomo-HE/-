<!DOCTYPE html>
<html lang="ja">

  <meta charset="UTF-8"/>

  <meta name="apple-mobile-web-app-capable" content="yes"/>

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    input, select, textarea { font-size: 16px; } /* iOSズーム防止 */

    select, input, button, textarea { font-family: inherit; }

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── 定数 ──────────────────────────────────────────
const DEFAULT_VENDORS = ["なんていい日だなぁ", "一柳重機", "kmax", "エクスト", "ステラ", "後熊", "深澤", "松井", "トラスト", "森田"];
const PALETTE_COLORS = ["#3b6fd4","#2d9e6b","#d44f3b","#8e44ad","#e67e22","#16a085","#c0392b","#2980b9"];
const PALETTE_BGS    = ["#eef3fc","#edf7f2","#fceeed","#f5eef8","#fdf2e9","#e8f8f5","#fdedec","#ebf5fb"];
const KOUTEI_OPTIONS = ["","コラム建てam","コラム建てpm","建て方１日目","建て方２日目","建て方３日目","建て方１日目（手起こし）","建て方２日目（手起こし）","建て方３日目（手起こし）","その他"];
const TSUBO_OPTIONS = ["","30坪未満","30坪","35坪","40坪","45坪","50坪","55坪","60坪","65坪","70坪","75坪","80坪","85坪","90坪","95坪","100坪","100坪以上"];
const PRICE_CATEGORIES_DEFAULT = ["コラム", "建て方", "１日", "ハーフ"];
const MANAGER_PASS = "0228";
const GYOMU_PASS = "0228";
const API_KEY = "$2a$10$1O88cF7wXbf2pSTZZxqBr.uqcIg5ILcQf9fGrbZmJyf780h0jIqq.";
const JSONBIN_BASE = "https://api.jsonbin.io/v3";
const STORAGE_KEY = "荷揚げv6";
const PRICE_CAT_KEY = "荷揚げ_vendorPriceCategories";
function loadVendorPriceCategories() {
  try { const r = localStorage.getItem(PRICE_CAT_KEY); return r ? JSON.parse(r) : {}; }
  catch { return {}; }
}
function saveVendorPriceCategories(c) { localStorage.setItem(PRICE_CAT_KEY, JSON.stringify(c)); }
function getVendorCategories(vpcMap, vendorName) {
  return vpcMap[vendorName] || [...PRICE_CATEGORIES_DEFAULT];
}
const VENDOR_PASSES_KEY = "荷揚げ_vendorPasses";

function loadVendorPasses() {
  try { const r = localStorage.getItem(VENDOR_PASSES_KEY); return r ? JSON.parse(r) : {}; }
  catch { return {}; }
}
function saveVendorPasses(p) { localStorage.setItem(VENDOR_PASSES_KEY, JSON.stringify(p)); }
function getVendorPass(passes, vendorName) { return passes[vendorName] || "0000"; }
const BIN_STORAGE_KEY = "荷揚げ_binid";
const DEFAULT_BIN_ID = "6a23a553f5f4af5e29c12fb2";
const VENDORS_STORAGE_KEY = "荷揚げ_vendors";
const NAMES_STORAGE_KEY = "荷揚げ_names";

// ── JSONBin API ───────────────────────────────────
async function fetchBin(binId) {
  const res = await fetch(`${JSONBIN_BASE}/b/${binId}/latest`, { headers: { "X-Master-Key": API_KEY } });
  if (!res.ok) throw new Error("fetch failed");
  return (await res.json()).record;
}
async function updateBin(binId, data) {
  const res = await fetch(`${JSONBIN_BASE}/b/${binId}`, {
    method: "PUT", headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error("update failed");
}
async function createBin(data) {
  const res = await fetch(`${JSONBIN_BASE}/b`, {
    method: "POST", headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY, "X-Bin-Name": "荷揚げ管理" },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error("create failed");
  return (await res.json()).metadata.id;
}

// ── ローカルストレージ ────────────────────────────
const DEFAULT_VENDOR_MEMBERS = {
  "なんていい日だなぁ": ["中澤","松岡","畑澤","丹羽","トルシン","松浦"],
  "一柳重機": ["榊原","近藤"],
  "kmax": []
};

function loadLocal() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if(r) {
      const parsed = JSON.parse(r);
      // vendorMembersが空なら初期値を設定
      if(!parsed.vendorMembers || Object.keys(parsed.vendorMembers).length === 0) {
        parsed.vendorMembers = DEFAULT_VENDOR_MEMBERS;
      }
      return parsed;
    }
    return { requests:[], assignments:{}, vendorMembers:DEFAULT_VENDOR_MEMBERS, vendorSchedules:{}, unitPrices:{}, orders:[], vendorAmounts:{}, memberAssignments:{}, changeRequests:[], orderStatus:{} };
  } catch { return { requests:[], assignments:{}, vendorMembers:DEFAULT_VENDOR_MEMBERS, vendorSchedules:{}, unitPrices:{}, orders:[], vendorAmounts:{}, memberAssignments:{}, changeRequests:[], orderStatus:{} }; }
}
function saveLocal(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function loadVendors() {
  try {
    const r = localStorage.getItem(VENDORS_STORAGE_KEY);
    if(!r) return DEFAULT_VENDORS;
    const saved = JSON.parse(r);
    // DEFAULT_VENDORSに新しい業者があれば末尾に追加
    const merged = [...saved];
    DEFAULT_VENDORS.forEach(v => { if(!merged.includes(v)) merged.push(v); });
    return merged;
  }
  catch { return DEFAULT_VENDORS; }
}
function saveVendors(v) { localStorage.setItem(VENDORS_STORAGE_KEY, JSON.stringify(v)); }
function loadNames() {
  try { const r = localStorage.getItem(NAMES_STORAGE_KEY); return r ? JSON.parse(r) : []; }
  catch { return []; }
}
function saveNames(n) { localStorage.setItem(NAMES_STORAGE_KEY, JSON.stringify(n)); }

// ── ユーティリティ ────────────────────────────────
function today() { return new Date().toISOString().slice(0,10); }
function daysInMonth(ym) { const [y,m]=ym.split("-").map(Number); return new Date(y,m,0).getDate(); }
function dayOfWeek(s) { return ["日","月","火","水","木","金","土"][new Date(s).getDay()]; }
function weekdayIdx(s) { return new Date(s).getDay(); }
function isPast(ds) { return ds < today(); }
function vendorColor(v,vendors) { const i=vendors.indexOf(v); return i>=0?PALETTE_COLORS[i%PALETTE_COLORS.length]:"#8e8e93"; }
function vendorBg(v,vendors) { const i=vendors.indexOf(v); return i>=0?PALETTE_BGS[i%PALETTE_BGS.length]:"#f2f2f7"; }
function formatDate(ds) { return ds ? `${ds.slice(5,7)}/${ds.slice(8,10)}` : ""; }
function addDays(ds, n) {
  const d = new Date(ds); d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function getWeekRange(offset=0) {
  const d = new Date(today());
  const dow = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate()-dow+1+(offset*7));
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  return { start: mon.toISOString().slice(0,10), end: sun.toISOString().slice(0,10) };
}

// ── PinPad ──────────────────────────────────────
function PinPad({ title, onSuccess, onCancel }) {
  const [pins, setPins] = useState(["","","",""]);
  const [shake, setShake] = useState(false);
  const handleDigit = (digit) => {
    const idx = pins.findIndex(p=>p==="");
    if(idx===-1) return;
    const next=[...pins]; next[idx]=digit; setPins(next);
    if(idx===3) {
      const code=[...next].join("");
      setTimeout(()=>{
        if(code===MANAGER_PASS) { onSuccess(); }
        else { setShake(true); setTimeout(()=>{ setPins(["","","",""]); setShake(false); },600); }
      },150);
    }
  };
  const handleDelete = () => {
    const last=[...pins].map((p,i)=>p!==""?i:-1).filter(i=>i!==-1).pop();
    if(last===undefined) return;
    const next=[...pins]; next[last]=""; setPins(next);
  };
  return (
    <div style={S.pinOverlay}>
      <div style={S.pinSheet}>
        <div style={S.pinIcon}>🔒</div>
        <div style={S.pinTitle}>{title||"ログイン"}</div>
        <div style={S.pinSub}>4桁のパスワードを入力</div>
        <div style={{...S.pinDots, animation:shake?"shake 0.4s ease":"none"}}>
          {pins.map((p,i)=>(
            <div key={i} style={{...S.pinDot, background:p!==""?"#1c1c1e":"transparent", border:`2px solid ${p!==""?"#1c1c1e":"#c7c7cc"}`}}/>
          ))}
        </div>
        <div style={S.pinKeypad}>
          {["1","2","3","4","5","6","7","8","9","","0","⌫"].map((k,i)=>(
            <button type="button" key={i} style={{...S.pinKey,...(k===""?S.pinKeyEmpty:{})}}
              onClick={()=>{ if(k==="⌫") handleDelete(); else if(k!=="") handleDigit(k); }}>
              {k}
            </button>
          ))}
        </div>
        {onCancel&&<button type="button" style={S.pinCancel} onClick={onCancel}>キャンセル</button>}
      </div>
    </div>
  );
}

// ── 業者パスワード設定UI ─────────────────────────
function VendorPassSetting({ vendorName, currentPass, onSave }) {
  const [editing, setEditing] = useState(false);
  const [newPass, setNewPass] = useState("");
  const [err, setErr] = useState("");
  const handleSave = () => {
    if(newPass.length!==4||!/^\d{4}$/.test(newPass)){ setErr("4桁の数字で入力してください"); return; }
    onSave(newPass); setNewPass(""); setEditing(false); setErr("");
  };
  return (
    <div style={{marginTop:8,paddingTop:8,borderTop:"0.5px solid #f2f2f7"}}>
      {!editing ? (
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:"#8e8e93"}}>🔐 パスワード：{"●".repeat(currentPass.length)}</span>
          <button type="button" style={{fontSize:11,color:"#007aff",background:"none",border:"none",cursor:"pointer",padding:"2px 6px"}} onClick={()=>setEditing(true)}>変更</button>
        </div>
      ) : (
        <div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input style={{...S.formInput,flex:1,fontSize:14,letterSpacing:4}} type="number" maxLength={4}
              value={newPass} onChange={e=>{ setNewPass(e.target.value.slice(0,4)); setErr(""); }}
              placeholder="新しいPIN（4桁）"/>
            <button type="button" style={S.btnPrimary} onClick={handleSave}>保存</button>
            <button type="button" style={S.btnGhost} onClick={()=>{ setEditing(false); setNewPass(""); setErr(""); }}>×</button>
          </div>
          {err&&<div style={{fontSize:11,color:"#ff3b30",marginTop:4}}>{err}</div>}
        </div>
      )}
    </div>
  );
}

// ── 業者金額入力コンポーネント ──────────────────────
function VendorAmountInput({ r, vendorId, onSaveAmount }) {
  const [editing, setEditing] = useState(false);
  const vendorAmounts = r.vendorAmounts || {};
  const vendorAmt = vendorAmounts[vendorId] || "";
  const [amount, setAmount] = useState(vendorAmt);

  useEffect(()=>{
    const va = (r.vendorAmounts||{})[vendorId]||"";
    setAmount(va);
  },[JSON.stringify(r.vendorAmounts), vendorId]);
  return (
    <div style={{marginTop:8,paddingTop:8,borderTop:"0.5px solid #f2f2f7"}}>
      {!editing ? (
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:12,color:"#8e8e93"}}>
            {amount ? `請求金額：¥${Number(amount).toLocaleString()}` : "請求金額：未入力"}
          </span>
          <button type="button" style={{fontSize:11,color:"#1a1a1a",background:"none",border:"1px solid #ddd",borderRadius:4,padding:"3px 8px",cursor:"pointer"}}
            onClick={()=>setEditing(true)}>入力</button>
        </div>
      ) : (
        <div>
          <div style={{fontSize:11,color:"#8e8e93",marginBottom:4}}>請求金額を入力（円）</div>
          <div style={{display:"flex",gap:8}}>
            <input type="number" style={{...S.formInput,flex:1,fontSize:14}} value={amount}
              onChange={e=>setAmount(e.target.value)} placeholder="例：150000"/>
            <button type="button" style={{...S.btnPrimary,padding:"6px 12px",fontSize:13}} onClick={()=>{
              onSaveAmount(r.id, vendorId, amount);
              setEditing(false);
            }}>保存</button>
            <button type="button" style={{...S.btnGhost,padding:"6px 10px",fontSize:13}} onClick={()=>setEditing(false)}>×</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 業者用案件カード（メンバー割当＋金額入力一体型）──────
function VendorReqCard({ r, a, vendorId, vendors, vendorMembers, initialSelected, currentAmount, onDelete, onSaveMember, onSaveAmount }) {
  const [editingMember, setEditingMember] = useState(false);
  const [selected, setSelected] = useState(initialSelected||[]);
  const [editingAmount, setEditingAmount] = useState(false);
  const [amount, setAmount] = useState(currentAmount||"");
  const [, forceUpdate] = useState(0);

  useEffect(()=>{ if(initialSelected) setSelected(initialSelected); },[JSON.stringify(initialSelected)]);
  useEffect(()=>{ setAmount(currentAmount||""); },[currentAmount]);

  const toggleMember=(m)=>{ setSelected(prev=>prev.includes(m)?prev.filter(x=>x!==m):[...prev,m]); forceUpdate(n=>n+1); };

  return (
    <div style={{background:"#fff",borderRadius:12,padding:"12px 14px",marginBottom:8,borderLeft:`3px solid ${vendorColor(vendorId,vendors)}`,boxSizing:"border-box",width:"100%"}}>
      {/* ヘッダー */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:"#aaa",marginBottom:2}}>管理者より</div>
          <div style={{fontSize:14,fontWeight:500,color:"#1a1a1a"}}>{r.bukken||"物件名未入力"}</div>
          <div style={{fontSize:12,color:"#8e8e93",marginTop:2}}>担当：{r.name}</div>
          {r.koutei&&<div style={{fontSize:10,color:"#0055c1",background:"#eef3ff",borderRadius:4,padding:"1px 6px",display:"inline-block",marginTop:2}}>{r.koutei}</div>}
          <div style={{fontSize:12,color:"#8e8e93",marginTop:3}}>
            {a[vendorId]}人{r.tsubo?`　${r.tsubo}`:""}{r.floors?`　${r.floors}階`:""}
          </div>
          {r.daiku&&<div style={{fontSize:12,color:"#8e8e93",marginTop:2}}>大工：{r.daiku}</div>}
          {r.rekkaa&&<div style={{fontSize:12,color:"#8e8e93",marginTop:2}}>レッカー：{r.rekkaa}</div>}
          {r.note&&<div style={{fontSize:12,color:"#8e8e93",marginTop:2}}>備考：{r.note}</div>}
        </div>
        <button type="button" style={{background:"#fff0f0",border:"none",fontSize:12,color:"#ff3b30",cursor:"pointer",borderRadius:6,width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onDelete}>✕</button>
      </div>

      {/* 案内図 */}
      {r.annaizu&&<img src={r.annaizu} style={{maxWidth:"100%",borderRadius:6,marginTop:6,border:"1px solid #eee",display:"block"}}/>}
      {r.annaizu2&&<img src={r.annaizu2} style={{maxWidth:"100%",borderRadius:6,marginTop:6,border:"1px solid #eee",display:"block"}}/>}

      {/* 金額入力 */}
      <div style={{marginTop:10,paddingTop:8,borderTop:"0.5px solid #f2f2f7",boxSizing:"border-box",width:"100%",overflow:"hidden"}}>
        <div style={{fontSize:11,color:"#8e8e93",marginBottom:4}}>請求金額（円）</div>
        <div style={{display:"flex",gap:6,alignItems:"center",width:"100%",boxSizing:"border-box"}}>
          <input type="number"
            style={{flex:1,minWidth:0,padding:"8px 8px",borderRadius:7,border:"1px solid #ddd",fontSize:14,fontFamily:"inherit",background:"#fafafa",boxSizing:"border-box"}}
            value={amount} onChange={e=>setAmount(e.target.value)} placeholder="金額を入力"/>
          <button type="button" style={{padding:"8px 10px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}
            onClick={()=>{ onSaveAmount&&onSaveAmount(r.id,vendorId,amount); }}>保存</button>
        </div>
        {amount&&<div style={{fontSize:12,color:"#2d9e6b",marginTop:4,fontWeight:600}}>¥{Number(amount).toLocaleString()}</div>}
      </div>

      {/* メンバー割当 */}
      <div style={{marginTop:8,paddingTop:8,borderTop:"0.5px solid #f2f2f7"}}>
        {!editingMember ? (
          <div>
            {selected.length>0 ? (
              <div>
                <div style={{fontSize:11,color:"#8e8e93",marginBottom:4}}>担当メンバー</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
                  {selected.map(m=>(
                    <span key={m} style={{fontSize:12,padding:"3px 10px",borderRadius:6,background:"#eef3fc",color:"#3b6fd4",fontWeight:600}}>{m}</span>
                  ))}
                </div>
                <button type="button" style={{fontSize:11,padding:"5px 10px",background:"#f2f2f7",border:"none",borderRadius:5,cursor:"pointer",color:"#1a1a1a"}}

        ) : (
          <div style={{background:"#f9f9f9",borderRadius:8,padding:"10px"}}>
            <div style={{fontSize:11,color:"#8e8e93",marginBottom:8}}>メンバーを選択（複数可）</div>

            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {vendorMembers.map(m=>{
                const isSel=selected.includes(m);
                return (
                  <div key={m} onClick={()=>toggleMember(m)}
                    style={{fontSize:12,padding:"6px 10px",borderRadius:7,border:`2px solid ${isSel?"#1a1a1a":"#e5e5ea"}`,
                      background:isSel?"#1a1a1a":"#fff",color:isSel?"#fff":"#1a1a1a",cursor:"pointer",fontWeight:isSel?600:400}}>
                    {isSel?"✓ ":""}{m}
                  </div>
                );
              })}
            </div>
            {selected.length>0&&<div style={{fontSize:11,color:"#1a1a1a",marginBottom:8,fontWeight:600}}>選択中（{selected.length}名）：{selected.join("、")}</div>}
            <div style={{display:"flex",gap:8}}>
              <button type="button" style={{padding:"8px 16px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:"pointer"}}
                onClick={()=>{ onSaveMember(r.id,selected); setEditingMember(false); }}>確定</button>
              <button type="button" style={{padding:"8px 12px",background:"#f5f5f5",color:"#888",border:"none",borderRadius:7,fontSize:13,cursor:"pointer"}}
                onClick={()=>setEditingMember(false)}>キャンセル</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── メンバー割当カード（業者モード用）────────────────
function MemberAssignCard({ r, a, vendorId, vendors, vendorMembers, onDelete, onSave, initialSelected, onSaveAmount }) {
  const [editing, setEditing] = useState(false);
  const [selected, setSelected] = useState(initialSelected||[]);
  const [, forceUpdate] = useState(0);

  // initialSelectedが変わったら同期
  useEffect(()=>{ if(initialSelected) setSelected(initialSelected); },[JSON.stringify(initialSelected)]);

  const toggleMember = (m) => {
    setSelected(prev => {
      const next = prev.includes(m) ? prev.filter(x=>x!==m) : [...prev, m];
      return next;
    });
    forceUpdate(n => n+1);
  };

  return (
    <div style={{...S.reqCard, borderLeftColor:vendorColor(vendorId,vendors), maxWidth:"100%", boxSizing:"border-box", overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:12,color:"#8e8e93",marginBottom:2}}>📋 管理者より</div>
          <div style={S.reqName}>{r.bukken||"物件名未入力"}</div>
          {r.koutei&&<div style={S.kouteiChip}>{r.koutei}</div>}
          <div style={S.reqMeta}>👷 {a[vendorId]}人{r.tsubo?`　${r.tsubo}`:""}{r.floors?`　${r.floors}階`:""}</div>
          {r.note&&<div style={S.reqNote}>{r.note}</div>}
        </div>
        <button type="button" style={S.delBtn} onClick={onDelete}>✕</button>
      </div>

      {/* 割当済みメンバー表示 */}
      {!editing && (
        <div>
          {selected.length > 0 ? (
            <div style={{marginTop:6}}>
              <div style={{fontSize:11,color:"#8e8e93",marginBottom:4}}>👥 担当メンバー</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
                {selected.map(m=>(
                  <span key={m} style={{fontSize:12,padding:"3px 10px",borderRadius:6,background:"#eef3fc",color:"#3b6fd4",fontWeight:600}}>
                    {m}
                  </span>
                ))}
              </div>
              <button type="button" style={{...S.btnAssign,fontSize:11}} onClick={()=>setEditing(true)}>✏️ メンバーを変更</button>
            </div>
          ) : (
            <button type="button" style={S.btnAssign} onClick={()=>{ setEditing(true); setSelected([]); }}>
              👤 メンバーを割り当てる
            </button>
          )}
        </div>
      )}
      {editing && (
        <div style={S.splitPanel}>
          <div style={S.splitHint}>担当メンバーを選択（複数可）</div>
          {vendorMembers.length===0&&(
            <div style={{fontSize:12,color:"#aeaeb2",marginBottom:8}}>メンバータブから登録してください。</div>
          )}
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10,width:"100%"}}>
            {vendorMembers.map(m=>{
              const isSel = selected.includes(m);
              return (
                <div key={m}
                  onClick={()=>toggleMember(m)}
                  style={{fontSize:12,padding:"6px 10px",borderRadius:7,
                    border:`2px solid ${isSel?"#007aff":"#e5e5ea"}`,
                    background:isSel?"#007aff":"#fff",
                    color:isSel?"#fff":"#1c1c1e",
                    cursor:"pointer",userSelect:"none",
                    fontWeight:isSel?600:400,
                    boxSizing:"border-box"}}>
                  {isSel?"✓ ":""}{m}
                </div>
              );
            })}
          </div>
          {selected.length>0&&(
            <div style={{fontSize:12,color:"#007aff",marginBottom:8,fontWeight:600}}>
              選択中（{selected.length}名）：{selected.join("、")}
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <button type="button" style={S.btnPrimary} onClick={()=>{ onSave(r.id,selected); setEditing(false); }}>確定</button>
            <button type="button" style={S.btnGhost} onClick={()=>{ setEditing(false); }}>キャンセル</button>
          </div>
        </div>
      )}
      <VendorAmountInput r={r} vendorId={vendorId} onSaveAmount={onSaveAmount}/>
    </div>
  );
}

// ── カレンダーコンポーネント ──────────────────────
function CalendarView({ currentYM, setCurrentYM, requestsByDate, assignments, vendors, role, vendorId, vendorSchedules, onDayTap, onAddSchedule, onDeleteSchedule, onDeleteRequest, renderSplitUI, renderDiscloseBtn, vendorMembers, onSaveMemberAssign, onEditRequest, renderChangeStatus, highlightDates, memberAssignments, onSaveAmount, allRequests, vendorAmounts }) {
  const days = daysInMonth(currentYM);
  const firstDay = new Date(currentYM+"-01").getDay();
  const [selDate, setSelDate] = useState(null);

  const prevM=()=>{ const d=new Date(currentYM+"-01"); d.setMonth(d.getMonth()-1); setCurrentYM(d.toISOString().slice(0,7)); setSelDate(null); };
  const nextM=()=>{ const d=new Date(currentYM+"-01"); d.setMonth(d.getMonth()+2); d.setDate(0); setCurrentYM(d.toISOString().slice(0,7)); setSelDate(null); };

  const dateReqs = selDate ? (requestsByDate[selDate]||[]) : [];
  const vendorScheds = (vendorId && selDate) ? ((vendorSchedules[vendorId]||[]).filter(s=>s.date===selDate)) : [];

  return (
    <div>
      <div style={S.calNav}>
        <button type="button" style={S.calNavBtn} onClick={prevM}>‹</button>
        <span style={S.calNavTitle}>{currentYM.replace("-","年")}月</span>
        <button type="button" style={S.calNavBtn} onClick={nextM}>›</button>
      </div>
      <div style={S.calGrid}>
        {["日","月","火","水","木","金","土"].map(d=>(
          <div key={d} style={{...S.calDow,color:d==="日"?"#ff3b30":d==="土"?"#007aff":"#8e8e93"}}>{d}</div>
        ))}
        {Array.from({length:firstDay}).map((_,i)=><div key={"e"+i}/>)}
        {Array.from({length:days}).map((_,i)=>{
          const ds=`${currentYM}-${String(i+1).padStart(2,"0")}`;
          const reqs=requestsByDate[ds]||[];
          const vscheds=vendorId?(vendorSchedules[vendorId]||[]).filter(s=>s.date===ds):[];
          const total=reqs.reduce((s,r)=>s+r.count,0);
          const isT=ds===today(); const isSel=ds===selDate;
          const past=isPast(ds); const wi=weekdayIdx(ds);
          // 業者モードでは開示済みのみ表示
          const visibleReqs = vendorId ? reqs.filter(r=>{ const a=assignments[r.id]; return a&&a[vendorId]; }) : reqs;
          return (
            <button type="button" key={ds}
              style={{...S.calCell,...(isT?S.calCellToday:{}),...(isSel?S.calCellSel:{}),...(past&&!isT?S.calCellPast:{}),...(highlightDates&&highlightDates.includes(ds)?S.calCellHighlight:{})}}
              onClick={()=>{ setSelDate(isSel?null:ds); if(onDayTap) onDayTap(ds, visibleReqs.length===0); }}>
              <span style={{...S.calNum, background:isT?"#1a1a1a":"transparent",
                color:past&&!isT?"#c7c7cc":isT?"#fff":wi===0?"#ff3b30":wi===6?"#007aff":"#1c1c1e"}}>
                {i+1}
              </span>
              {(visibleReqs.length>0||vscheds.length>0)&&(
                <div style={{...S.calCount,opacity:past?0.5:1}}>
                  {visibleReqs.length>0&&<span style={{fontSize:8}}>●</span>}
                  {vscheds.length>0&&<span style={{fontSize:7,marginLeft:2}}>📌</span>}
                </div>
              )}
              <div style={{display:"flex",flexWrap:"wrap",gap:1,justifyContent:"center",marginTop:1}}>
                {visibleReqs.map(r=>{ const a=assignments[r.id];
                  const color = vendorId ? vendorColor(vendorId,vendors) : (a?vendorColor(Object.keys(a)[0],vendors):"#c7c7cc");
                  return <div key={r.id} style={{...S.calDot,background:past?"#ccc":color}}/>;
                })}
                {vscheds.map(s=><div key={s.id} style={{...S.calDot,background:"#ff9500"}}/>)}
              </div>
            </button>
          );
        })}
      </div>

      {/* 選択日詳細 */}
      {selDate&&(
        <div style={S.detailCard}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,paddingBottom:8,borderBottom:"0.5px solid #f2f2f7"}}>
            <div style={S.detailTitle}>{selDate}（{dayOfWeek(selDate)}）</div>
            {vendorId&&!isPast(selDate)&&(
              <button type="button" style={S.addDayBtn} onClick={()=>onAddSchedule&&onAddSchedule(selDate)}>＋ 予定追加</button>
            )}
            {role==="担当者"&&!isPast(selDate)&&!vendorId&&(
              <button type="button" style={S.addDayBtn} onClick={()=>onDayTap&&onDayTap(selDate,true)}>＋ 追加</button>
            )}
          </div>

          {/* 業者モード：開示済み案件 */}
          {vendorId&&dateReqs.filter(r=>{ const a=assignments[r.id]; return a&&a[vendorId]; }).map(r=>{
            const a=assignments[r.id];
            return (
              <VendorReqCard
                key={r.id}
                r={r} a={a} vendorId={vendorId} vendors={vendors}
                vendorMembers={vendorMembers||[]}
                initialSelected={memberAssignments&&memberAssignments[r.id]?(memberAssignments[r.id][vendorId]||[]):[]}
                currentAmount={(r.vendorAmounts||{})[vendorId]||""}
                onDelete={()=>onDeleteRequest&&onDeleteRequest(r.id)}
                onSaveMember={(reqId,members)=>onSaveMemberAssign&&onSaveMemberAssign(reqId,members)}
                onSaveAmount={onSaveAmount}/>
            );
          })}

          {/* 業者モード：独自スケジュール */}
          {vendorId&&vendorScheds.map(s=>(
            <div key={s.id} style={{...S.reqCard,borderLeftColor:"#ff9500"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:"#ff9500",marginBottom:2}}>📌 自社スケジュール</div>
                  <div style={S.reqName}>{s.title}</div>
                  {s.member&&<div style={S.reqMeta}>👤 {s.member}</div>}
                  {s.note&&<div style={S.reqNote}>{s.note}</div>}
                </div>
                <button type="button" style={S.delBtn} onClick={()=>onDeleteSchedule&&onDeleteSchedule(vendorId,s.id)}>✕</button>
              </div>
            </div>
          ))}

          {/* 担当者・管理者モード */}
          {!vendorId&&dateReqs.map(r=>{
            const a=assignments[r.id];
            const fc=a?vendorColor(Object.keys(a)[0],vendors):"#c7c7cc";
            return (
              <div key={r.id} style={{...S.reqCard,borderLeftColor:fc}}>
                <div style={S.reqName}>{r.name}</div>
                {r.bukken&&<div style={S.bukken}>🏠 {r.bukken}</div>}
                {r.koutei&&<div style={S.kouteiChip}>{r.koutei}</div>}
                <div style={S.reqMeta}>👷 {r.count}人{r.tsubo?`　${r.tsubo}`:""}{r.floors?`　${r.floors}階`:""}</div>
                {r.daiku&&<div style={{fontSize:11,color:"#8e8e93",marginTop:2}}>大工：{r.daiku}</div>}
                {r.rekkaa&&<div style={{fontSize:11,color:"#8e8e93",marginTop:2}}>レッカー：{r.rekkaa}</div>}
                {r.note&&<div style={S.reqNote}>{r.note}</div>}
                {/* 管理者・担当者モードでは画像非表示 */}
                <div style={{...S.chipRow,justifyContent:"space-between"}}>
                  <div style={S.chipRow}>
                    {a ? Object.entries(a).map(([v,c])=>(
                      <span key={v} style={{...S.pill,background:vendorBg(v,vendors),color:vendorColor(v,vendors),fontWeight:600}}>{v} {c}人</span>
                    )) : <span style={S.pill}>未割当</span>}
                    {r.disclosed&&<span style={S.disclosedChip}>開示済</span>}
                  </div>
                  {(role==="担当者"||role==="管理者"||role==="業者")&&<button type="button" style={S.delBtn} onClick={()=>onDeleteRequest&&onDeleteRequest(r.id)}>✕</button>}
                </div>
                {role==="管理者"&&renderSplitUI&&renderSplitUI(r)}
                {role==="管理者"&&renderDiscloseBtn&&renderDiscloseBtn(r)}
                {renderChangeStatus&&renderChangeStatus(r)}
                {/* 業者のメンバー割当表示 */}
                {memberAssignments&&a&&Object.keys(a).map(vid=>{
                  const members=(memberAssignments[r.id]||{})[vid];
                  if(!members||members.length===0) return null;
                  return (
                    <div key={vid} style={{marginTop:5}}>
                      <div style={{fontSize:11,color:"#8e8e93",marginBottom:3}}>👥 {vid} 担当</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                        {members.map(m=>(
                          <span key={m} style={{fontSize:11,padding:"2px 8px",borderRadius:5,background:"#eef3fc",color:"#3b6fd4",fontWeight:600}}>{m}</span>
                        ))}
                      </div>
                    </div>
                  );
                })}
                {onEditRequest&&(
                  <button type="button" style={S.btnAssign} onClick={()=>onEditRequest(r)}>✏️ 編集</button>
                )}
              </div>
            );
          })}

          {!vendorId&&dateReqs.length===0&&<div style={S.empty}>予定なし</div>}
          {vendorId&&dateReqs.filter(r=>{ const a=assignments[r.id]; return a&&a[vendorId]&&r.disclosed; }).length===0&&vendorScheds.length===0&&(
            <div style={S.empty}>予定なし</div>
          )}
        </div>
      )}

      {/* 業者月合計 */}
      {vendorId&&allRequests&&(()=>{
        const monthReqs = allRequests.filter(r=>r.date.startsWith(currentYM));
        const assignedReqs = monthReqs.filter(r=>{ const a=assignments[r.id]; return a&&a[vendorId]&&r.disclosed; });
        const monthTotal = assignedReqs.reduce((sum,r)=>{
          const va=(vendorAmounts||{})[r.id];
          return sum + (va&&va[vendorId]?Number(va[vendorId]):0);
        },0);
        if(assignedReqs.length===0) return null;
        return (
          <div style={{background:"#1a1a1a",borderRadius:10,padding:"12px 16px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:10,color:"#888",letterSpacing:"0.08em"}}>{currentYM.replace("-","年")}月の実績</div>
              <div style={{fontSize:12,color:"#aaa",marginTop:2}}>{assignedReqs.length}件</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"#888"}}>請求合計</div>
              <div style={{fontSize:20,fontWeight:600,color:monthTotal>0?"#2d9e6b":"#888"}}>
                {monthTotal>0?`¥${monthTotal.toLocaleString()}`:"未入力"}
              </div>
            </div>
          </div>
        );
      })()}

      {/* 凡例 */}
      <div style={S.legend}>
        {vendors.map(v=>(<span key={v} style={S.legendItem}><span style={{...S.calDot,background:vendorColor(v,vendors),display:"inline-block"}}/>{v}</span>))}
        <span style={S.legendItem}><span style={{...S.calDot,background:"#c7c7cc",display:"inline-block"}}/>未割当</span>
        {vendorId&&<span style={S.legendItem}><span style={{...S.calDot,background:"#ff9500",display:"inline-block"}}/>自社予定</span>}
      </div>
    </div>
  );
}

// ── 予定登録フォーム ──────────────────────────────
function RegisterForm({ initialDate, vendors, names, onSave, onCancel, syncing }) {
  const [form, setForm] = useState({ name:names[0]||"", bukken:"", date:initialDate||today(), koutei:"", count:"", tsubo:"", floors:"", note:"" });
  const [nameInput, setNameInput] = useState(names[0]||"");
  const [showNameDrop, setShowNameDrop] = useState(false);
  const handleSave = () => {
    if(!form.name||!form.date||!form.count) return;
    const newNames=[form.name,...names.filter(n=>n!==form.name)].slice(0,20);
    saveNames(newNames);
    onSave({...form, count:Number(form.count)});
  };
  return (
    <div style={S.formCard}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={S.formTitle}>予定を登録</div>
        {onCancel&&<button type="button" style={S.closeBtn} onClick={onCancel}>✕</button>}
      </div>
      <div style={S.formRow}>
        <label style={S.formLabel}>担当者名 <span style={{color:"#ff3b30"}}>*</span></label>
        <div style={{position:"relative"}}>
          <input style={S.formInput} value={nameInput}
            onChange={e=>{ setNameInput(e.target.value); setForm(f=>({...f,name:e.target.value})); }}
            onFocus={()=>setShowNameDrop(true)} placeholder="名前を入力または選択"/>
          {showNameDrop&&names.length>0&&(
            <div style={S.nameDrop}>
              {names.map(n=>(<div key={n} style={S.nameDropItem} onClick={()=>{ setNameInput(n); setForm(f=>({...f,name:n})); setShowNameDrop(false); }}>{n}</div>))}
              <div style={S.nameDropClose} onClick={()=>setShowNameDrop(false)}>閉じる</div>
            </div>
          )}
        </div>
      </div>
      <div style={S.formRow}>
        <label style={S.formLabel}>物件名</label>
        <input style={S.formInput} value={form.bukken} onChange={e=>setForm(f=>({...f,bukken:e.target.value}))} placeholder="フルネームで入力してください（ひらがなでも可）"/>
        <div style={S.formHint}>※ 物件名はフルネームで入力してください（ひらがなでも可）</div>
      </div>
      <div style={S.formRow}>
        <label style={S.formLabel}>工程</label>
        <select style={S.formInput} value={form.koutei} onChange={e=>setForm(f=>({...f,koutei:e.target.value}))}>
          {KOUTEI_OPTIONS.map(o=><option key={o} value={o}>{o||"─ 選択してください ─"}</option>)}
        </select>
      </div>
      <div style={S.formRow}>
        <label style={S.formLabel}>大工名</label>
        <div style={{display:"flex",gap:6,marginBottom:4}}>
          <button type="button"
            style={{fontSize:11,padding:"4px 10px",borderRadius:5,border:`1px solid ${!form.daikuMode||form.daikuMode==="input"?"#1a1a1a":"#eeeeee"}`,background:!form.daikuMode||form.daikuMode==="input"?"#1a1a1a":"#fff",color:!form.daikuMode||form.daikuMode==="input"?"#fff":"#888",cursor:"pointer"}}
            onClick={()=>setForm(f=>({...f,daikuMode:"input",daiku:""}))}>手入力</button>
          <button type="button"
            style={{fontSize:11,padding:"4px 10px",borderRadius:5,border:`1px solid ${form.daikuMode==="미정"?"#1a1a1a":"#eeeeee"}`,background:form.daikuMode==="미정"?"#1a1a1a":"#fff",color:form.daikuMode==="미정"?"#fff":"#888",cursor:"pointer"}}
            onClick={()=>setForm(f=>({...f,daikuMode:"미정",daiku:"未確定"}))}>未確定</button>
        </div>
        {(!form.daikuMode||form.daikuMode==="input")&&(
          <input style={S.formInput} value={form.daiku||""} onChange={e=>setForm(f=>({...f,daiku:e.target.value}))} placeholder="大工名を入力"/>
        )}
        {form.daikuMode==="미정"&&(
          <div style={{padding:"8px 11px",borderRadius:6,border:"1px solid #eeeeee",background:"#f5f5f5",fontSize:14,color:"#888"}}>未確定</div>
        )}
      </div>
      <div style={S.formRow}>
        <label style={S.formLabel}>日付 <span style={{color:"#ff3b30"}}>*</span></label>
        <input style={S.formInput} type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
      </div>
      <div style={S.formRow}>
        <label style={S.formLabel}>人数 <span style={{color:"#ff3b30"}}>*</span></label>
        <input style={S.formInput} type="number" min={1} max={30} value={form.count} onChange={e=>setForm(f=>({...f,count:e.target.value}))}/>
      </div>
      <div style={S.formRow}>
        <label style={S.formLabel}>おおよその坪数</label>
        <select style={S.formInput} value={form.tsubo} onChange={e=>setForm(f=>({...f,tsubo:e.target.value}))}>
          {TSUBO_OPTIONS.map(o=><option key={o} value={o}>{o||"─ 選択してください ─"}</option>)}
        </select>
      </div>
      <div style={S.formRow}>
        <label style={S.formLabel}>階数</label>
        <input style={S.formInput} type="number" value={form.floors} onChange={e=>setForm(f=>({...f,floors:e.target.value}))} placeholder="例：2"/>
      </div>
      <div style={S.formRow}>
        <label style={S.formLabel}>レッカー</label>
        <select style={S.formInput} value={form.rekkaa||""} onChange={e=>setForm(f=>({...f,rekkaa:e.target.value}))}>
          <option value="">─ 選択してください ─</option>
          <option value="あり">あり</option>
          <option value="なし">なし</option>
        </select>
      </div>
      <div style={S.formRow}>
        <label style={S.formLabel}>備考</label>
        <input style={S.formInput} value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="例）資材13時納品"/>
      </div>
      <AnnaizuUploader annaizu={form.annaizu} onSelect={b64=>setForm(f=>({...f,annaizu:b64}))} onClear={()=>setForm(f=>({...f,annaizu:""}))} label="案内図１（PNG/JPG）"/>
      <AnnaizuUploader annaizu={form.annaizu2} onSelect={b64=>setForm(f=>({...f,annaizu2:b64}))} onClear={()=>setForm(f=>({...f,annaizu2:""}))} label="案内図２（PNG/JPG）"/>
      <button type="button" style={{...S.btnPrimary,width:"100%",marginTop:16,padding:"14px",fontSize:16,opacity:syncing?0.6:1}} onClick={handleSave} disabled={syncing}>
        {syncing?"保存中…":"登録する"}
      </button>
    </div>
  );
}

// ── 案内図アップローダー ─────────────────────────────
function AnnaizuUploader({ annaizu, onSelect, onClear, label }) {
  const inputRef = useRef(null);

  const handleChange = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      alert("10MB以下の画像を選択してください");
      return;
    }
    const reader = new FileReader();
    reader.onloadend = function() {
      if (!reader.result) return;
      // Canvasでリサイズ（最大800px）
      const img = new Image();
      img.onload = function() {
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const resized = canvas.toDataURL('image/jpeg', 0.7);
        onSelect(resized);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  };

  return (
    <div style={S.formRow}>
      <label style={S.formLabel}>{label||"案内図（PNG/JPG・1枚）"}</label>
      {annaizu ? (
        <div>
          <img src={annaizu} style={{maxWidth:"100%",maxHeight:200,borderRadius:8,marginBottom:8,border:"1px solid #eee",display:"block"}}/>
          <div style={{display:"flex",gap:8}}>
            <button type="button" style={{fontSize:12,padding:"6px 12px",background:"#f5f5f5",border:"none",borderRadius:6,cursor:"pointer",color:"#888"}}
              onClick={()=>inputRef.current&&inputRef.current.click()}>変更</button>
            <button type="button" style={{fontSize:12,padding:"6px 12px",background:"#fff0f0",border:"none",borderRadius:6,cursor:"pointer",color:"#ff3b30"}}
              onClick={onClear}>削除</button>
          </div>
        </div>
      ) : (
        <button type="button" style={{width:"100%",padding:"16px",border:"1.5px dashed #ddd",borderRadius:8,background:"#fafafa",cursor:"pointer",fontSize:13,color:"#888",display:"block",textAlign:"center"}}
          onClick={()=>inputRef.current&&inputRef.current.click()}>
          ＋ 画像を選択
        </button>
      )}
      <input ref={inputRef} type="file" accept="image/png,image/jpeg,image/jpg"
        style={{display:"none"}} onChange={handleChange}/>
    </div>
  );
}

// ── 発注一覧コンポーネント ──────────────────────────────
function OrderListView({ data, updateData, vendors, vendorColor, vendorBg, dayOfWeek, showToast }) {
  const [filter, setFilter] = useState("all"); // all | ordered | pending

  const orderStatus = data.orderStatus || {};
  const assignments = data.assignments || {};
  const vendorAmounts = data.vendorAmounts || {};

  // 開示済みで割当済みの案件を全件取得
  const allRows = [];
  data.requests.forEach(r => {
    if(!r.disclosed) return;
    const a = assignments[r.id];
    if(!a) return;
    Object.entries(a).forEach(([vid, cnt]) => {
      const orderKey = `${r.id}_${vid}`;
      const isOrdered = !!orderStatus[orderKey];
      const amount = (vendorAmounts[r.id]||{})[vid]||0;
      allRows.push({ reqId:r.id, vendor:vid, count:cnt, date:r.date, bukken:r.bukken||"物件名未入力", koutei:r.koutei, amount, isOrdered, orderKey, orderedAt:(orderStatus[orderKey]||{}).orderedAt });
    });
  });
  allRows.sort((a,b)=>a.date.localeCompare(b.date));

  const filteredRows = allRows.filter(r => {
    if(filter==="ordered") return r.isOrdered;
    if(filter==="pending") return !r.isOrdered;
    return true;
  });

  const pendingCount = allRows.filter(r=>!r.isOrdered).length;
  const orderedCount = allRows.filter(r=>r.isOrdered).length;

  const toggleOrder = async (row) => {
    const os = {...(data.orderStatus||{})};
    if(row.isOrdered) {
      delete os[row.orderKey];
    } else {
      os[row.orderKey] = { orderedAt: new Date().toISOString(), vendor: row.vendor, bukken: row.bukken, date: row.date };
    }
    await updateData({...data, orderStatus: os});
    showToast(row.isOrdered ? "発注申請を取り消しました" : "発注申請済みにしました");
  };

  return (
    <div>
      {/* 集計バー */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <div style={{flex:1,background:"#fff8e6",borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
          <div style={{fontSize:11,color:"#cc7700"}}>未申請</div>
          <div style={{fontSize:20,fontWeight:700,color:"#cc7700"}}>{pendingCount}</div>
        </div>
        <div style={{flex:1,background:"#e8faf0",borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
          <div style={{fontSize:11,color:"#1d8348"}}>申請済み</div>
          <div style={{fontSize:20,fontWeight:700,color:"#1d8348"}}>{orderedCount}</div>
        </div>
        <div style={{flex:1,background:"#f5f5f5",borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
          <div style={{fontSize:11,color:"#888"}}>合計</div>
          <div style={{fontSize:20,fontWeight:700,color:"#1a1a1a"}}>{allRows.length}</div>
        </div>
      </div>

      {/* 絞り込みボタン */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {[["all","すべて"],["pending","未申請"],["ordered","申請済み"]].map(([key,label])=>(
          <button type="button" key={key}
            style={{flex:1,padding:"7px",borderRadius:7,border:`1px solid ${filter===key?"#1a1a1a":"#eee"}`,background:filter===key?"#1a1a1a":"#fff",color:filter===key?"#fff":"#888",fontSize:12,cursor:"pointer"}}
            onClick={()=>setFilter(key)}>{label}</button>
        ))}
      </div>

      {/* 一覧 */}
      {filteredRows.length===0 && <div style={{textAlign:"center",color:"#ccc",fontSize:14,padding:"32px 0"}}>該当する案件がありません</div>}
      {filteredRows.map((row,i)=>(
        <div key={row.orderKey} style={{background:"#fff",borderRadius:10,padding:"12px 14px",marginBottom:8,boxShadow:"0 1px 3px rgba(0,0,0,0.05)",borderLeft:`3px solid ${row.isOrdered?"#2d9e6b":"#f5d76e"}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
            <div>
              <div style={{fontSize:12,color:"#8e8e93"}}>{row.date.slice(5).replace("-","/")}（{dayOfWeek(row.date)}）{row.koutei?`　${row.koutei}`:""}</div>
              <div style={{fontSize:14,fontWeight:600,color:"#1a1a1a"}}>{row.bukken}</div>
            </div>
            <button type="button"
              style={{padding:"5px 12px",borderRadius:6,border:`1px solid ${row.isOrdered?"#2d9e6b":"#ddd"}`,background:row.isOrdered?"#e8faf0":"#fff",color:row.isOrdered?"#1d8348":"#aaa",fontSize:11,fontWeight:row.isOrdered?600:400,cursor:"pointer",whiteSpace:"nowrap",marginLeft:8,flexShrink:0}}
              onClick={()=>toggleOrder(row)}>
              {row.isOrdered?"✓ 申請済み":"発注申請"}
            </button>
          </div>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <span style={{fontSize:11,padding:"2px 8px",borderRadius:5,background:vendorBg(row.vendor,vendors),color:vendorColor(row.vendor,vendors),fontWeight:600}}>{row.vendor}</span>
            <span style={{fontSize:11,color:"#8e8e93"}}>{row.count}人</span>
            {row.amount>0&&<span style={{fontSize:11,color:"#2d9e6b",fontWeight:600}}>¥{Number(row.amount).toLocaleString()}</span>}
          </div>
          {row.isOrdered&&row.orderedAt&&(
            <div style={{fontSize:10,color:"#aaa",marginTop:4}}>申請日時：{new Date(row.orderedAt).toLocaleString("ja-JP")}</div>
          )}
        </div>
      ))}
    </div>
  );
}

  const savedAmount = (data.vendorAmounts||{})[row.reqId]?.[(row.vendor)]||"";
  const [amount, setAmount] = useState(savedAmount?String(Number(savedAmount)):"");

  useEffect(()=>{
    const a=(data.vendorAmounts||{})[row.reqId]?.[(row.vendor)]||"";
    setAmount(a?String(Number(a)):"");
  },[JSON.stringify(data.vendorAmounts), row.reqId, row.vendor]);

  const handleSave = async () => {
    const va={...(data.vendorAmounts||{})};
    va[row.reqId]={...(va[row.reqId]||{}),[row.vendor]:amount};
    await updateData({...data, vendorAmounts:va});
    showToast("金額を保存しました");

  return (
    <div style={{background:i%2===0?"#fff":"#f9f9f9",borderBottom:"0.5px solid #f2f2f7",padding:"10px 12px"}}>

      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <span style={{fontSize:11,color:"#8e8e93",whiteSpace:"nowrap"}}>金額：</span>
        <input type="number" style={{flex:1,padding:"6px 8px",borderRadius:6,border:"1px solid #ddd",fontSize:14,fontFamily:"inherit"}}
          value={amount} onChange={e=>setAmount(e.target.value)} placeholder="金額を入力"/>

        {amount&&<span style={{fontSize:12,color:"#2d9e6b",fontWeight:600,whiteSpace:"nowrap"}}>¥{Number(amount).toLocaleString()}</span>}
      </div>
    </div>
  );
}

// ── 月間一覧コンポーネント ───────────────────────────
function MonthlyListView({ currentYM, setCurrentYM, requests, assignments, vendors, vendorId, role, vendorColor, vendorBg, dayOfWeek, onRefresh, syncing }) {
  const [sortMode, setSortMode] = React.useState("date"); // "date" | "name"

  const prevM = () => {
    const d = new Date(currentYM + "-01");
    d.setMonth(d.getMonth() - 1);
    setCurrentYM(d.toISOString().slice(0, 7));
  };
  const nextM = () => {
    const d = new Date(currentYM + "-01");
    d.setMonth(d.getMonth() + 1);
    setCurrentYM(d.toISOString().slice(0, 7));
  };

  const monthReqs = requests
    .filter(r => r.date.startsWith(currentYM))
    .filter(r => {
      if (!vendorId) return true;
      const a = assignments[r.id];
      return a && a[vendorId] && r.disclosed;
    })
    .sort((a, b) => {
      if(sortMode === "name") {
        const nameComp = (a.name||"").localeCompare(b.name||"", "ja");
        if(nameComp !== 0) return nameComp;
        return a.date.localeCompare(b.date);
      }
      return a.date.localeCompare(b.date);
    });

  const totalCount = monthReqs.reduce((s, r) => {
    if (vendorId && assignments[r.id]) return s + (assignments[r.id][vendorId] || 0);
    return s + r.count;
  }, 0);

  return (
    <div>
      {/* 月ナビ */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:2 }}>
          <button type="button" style={{ background:"none", border:"none", fontSize:22, color:"#aaa", cursor:"pointer", padding:"0 8px" }} onClick={prevM}>‹</button>
          <span style={{ fontSize:15, fontWeight:500, color:"#1a1a1a" }}>{currentYM.replace("-","年")}月</span>
          <button type="button" style={{ background:"none", border:"none", fontSize:22, color:"#aaa", cursor:"pointer", padding:"0 8px" }} onClick={nextM}>›</button>
        </div>
        <button type="button" style={{ fontSize:11, padding:"5px 10px", background:"#fff", border:"1px solid #eee", borderRadius:6, color:"#aaa", cursor:"pointer" }}
          onClick={onRefresh} disabled={syncing}>{syncing ? "取得中…" : "↻ 更新"}</button>
      </div>

      {/* ソートボタン（担当者モードのみ） */}
      {role === "担当者" && (
        <div style={{ display:"flex", gap:8, marginBottom:10 }}>
          <button type="button"
            style={{ flex:1, padding:"7px", borderRadius:7, border:`1px solid ${sortMode==="date"?"#1a1a1a":"#eee"}`, background:sortMode==="date"?"#1a1a1a":"#fff", color:sortMode==="date"?"#fff":"#888", fontSize:12, cursor:"pointer" }}
            onClick={()=>setSortMode("date")}>日付順</button>
          <button type="button"
            style={{ flex:1, padding:"7px", borderRadius:7, border:`1px solid ${sortMode==="name"?"#1a1a1a":"#eee"}`, background:sortMode==="name"?"#1a1a1a":"#fff", color:sortMode==="name"?"#fff":"#888", fontSize:12, cursor:"pointer" }}
            onClick={()=>setSortMode("name")}>担当者順</button>
        </div>
      )}

      {/* 合計バー */}
      <div style={{ display:"flex", justifyContent:"space-between", background:"#1a1a1a", borderRadius:8, padding:"10px 14px", marginBottom:12 }}>
        <span style={{ fontSize:12, color:"#aaa" }}>{monthReqs.length}件</span>
        <span style={{ fontSize:14, fontWeight:700, color:"#fff" }}>合計 {totalCount}人</span>
      </div>

      {/* テキストコピーボタン */}
      {monthReqs.length > 0 && (
        <button type="button"
          style={{ width:"100%", padding:"10px", marginBottom:12, background:"#fff", color:"#1a1a1a", border:"1px solid #eee", borderRadius:8, fontSize:12, fontWeight:400, cursor:"pointer", letterSpacing:"0.08em" }}
          onClick={()=>{
            const lines = [`■ ${currentYM.replace("-","年")}月　建て方一覧`, ""];
            monthReqs.forEach(r => {
              const a = assignments[r.id];
              const vendorStr = a ? Object.entries(a).map(([v,c])=>`${v} ${c}人`).join("・") : "未割当";
              const cnt = vendorId && a && a[vendorId] ? a[vendorId] : r.count;
              lines.push(`${r.date.slice(5).replace("-","/")}（${dayOfWeek(r.date)}）　${r.bukken||"物件名未入力"}　${r.name}　${r.koutei||""}　${cnt}人　${vendorStr}　${r.disclosed?"開示済":"未開示"}`);
            });
            lines.push("");
            lines.push(`合計 ${monthReqs.length}件　${monthReqs.reduce((s,r)=>{ const a=assignments[r.id]; if(vendorId&&a&&a[vendorId]) return s+a[vendorId]; return s+r.count; },0)}人`);
            const text = lines.join('\n');
            try {
              const el = document.createElement("textarea");
              el.value = text;
              el.style.position = "fixed";
              el.style.left = "0";
              el.style.top = "0";
              el.style.opacity = "0";
              document.body.appendChild(el);
              el.focus();
              el.select();
              document.execCommand("copy");
              document.body.removeChild(el);
              alert("コピーしました！LINEワークスに貼り付けてください");
            } catch(e) {
              alert("コピーに失敗しました。手動でコピーしてください。");
            }
          }}>
          テキストをコピー
        </button>
      )}

      {/* 案件なし */}
      {monthReqs.length === 0 && (
        <div style={{ textAlign:"center", color:"#ccc", fontSize:14, padding:"40px 0" }}>案件がありません</div>
      )}

      {/* カード一覧 */}
      {monthReqs.map((r, i) => {
        const a = assignments[r.id];
        const vendorEntries = a ? Object.entries(a) : [];
        return (
          <div key={r.id} style={{ background:"#fff", borderRadius:10, padding:"12px 14px", marginBottom:8, boxShadow:"0 1px 3px rgba(0,0,0,0.05)", borderLeft:`3px solid ${a ? vendorColor(Object.keys(a)[0], vendors) : "#ddd"}` }}>

            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:13, fontWeight:600, color:"#1a1a1a" }}>
                  {r.date.slice(5).replace("-","/")}（{dayOfWeek(r.date)}）
                </span>
                {r.koutei && (
                  <span style={{ fontSize:10, padding:"2px 7px", borderRadius:4, background:"#eef3ff", color:"#0055c1" }}>{r.koutei}</span>
                )}
              </div>
              {r.disclosed
                ? <span style={{ fontSize:10, padding:"2px 7px", borderRadius:4, background:"#e8faf0", color:"#1d8348", fontWeight:600 }}>開示済</span>
                : <span style={{ fontSize:10, padding:"2px 7px", borderRadius:4, background:"#f5f5f5", color:"#ccc" }}>未開示</span>
              }
            </div>

            {/* 2行目：物件名 */}
            <div style={{ fontSize:14, fontWeight:600, color:"#1a1a1a", marginBottom:4 }}>
              {r.bukken || "(物件名未入力)"}
            </div>

            {/* 3行目：担当者・人数 */}
            <div style={{ display:"flex", gap:12, alignItems:"center", marginBottom:4 }}>
              <span style={{ fontSize:11, color:"#8e8e93" }}>担当：{r.name}</span>
              <span style={{ fontSize:11, color:"#8e8e93" }}>
                {vendorId && a && a[vendorId] ? `${a[vendorId]}人` : `${r.count}人`}
              </span>
            </div>

            {/* 4行目：割当業者 */}
            {vendorEntries.length > 0 ? (
              <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:4 }}>
                {vendorEntries.map(([v, c]) => (
                  <span key={v} style={{ fontSize:11, padding:"2px 8px", borderRadius:5, background:vendorBg(v, vendors), color:vendorColor(v, vendors), fontWeight:600 }}>
                    {v} {c}人
                  </span>
                ))}
              </div>
            ) : (
              <span style={{ fontSize:11, color:"#ccc" }}>未割当</span>
            )}
          </div>
        );
      })}
    </div>
  );
}

  const [data, setData] = useState(loadLocal);
  const [vendors, setVendors] = useState(loadVendors);
  const [names, setNames] = useState(loadNames);
  const [role, setRole] = useState(null); // null | "担当者" | "管理者" | "業者" | "業務"
  const [showPin, setShowPin] = useState(null); // null | "管理者" | "業務"
  const [vendorId, setVendorId] = useState(null); // 業者モード選択中の業者
  const [view, setView] = useState("calendar");
  const [currentYM, setCurrentYM] = useState(today().slice(0,7));
  const [showRegisterFor, setShowRegisterFor] = useState(null);
  const [editingRequest, setEditingRequest] = useState(null);
  const [highlightDates, setHighlightDates] = useState([]);
  const [splitInputs, setSplitInputs] = useState({});
  const [toast, setToast] = useState(""); const [toastType, setToastType] = useState("ok");
  const [syncing, setSyncing] = useState(false); const [syncOk, setSyncOk] = useState(false);
  const [binId, setBinId] = useState(()=>{
    const saved = localStorage.getItem(BIN_STORAGE_KEY);
    if(!saved) {
      localStorage.setItem(BIN_STORAGE_KEY, DEFAULT_BIN_ID);
      return DEFAULT_BIN_ID;
    }
    return saved;
  });
  const [vendorEditMode, setVendorEditMode] = useState(false);
  const [vendorPriceCategories, setVendorPriceCategories] = useState(loadVendorPriceCategories);
  const [selectedCatVendor, setSelectedCatVendor] = useState(null);
  const [newCatName, setNewCatName] = useState("");
  const [editingCatIdx, setEditingCatIdx] = useState(null);
  const [editingCatName, setEditingCatName] = useState("");
  const [vendorPendingId, setVendorPendingId] = useState(null);
  const [vendorPasses, setVendorPasses] = useState(loadVendorPasses);
  const [vendorPassInput, setVendorPassInput] = useState("");
  const [vendorPassShake, setVendorPassShake] = useState(false);
  const [vendorPassDigits, setVendorPassDigits] = useState(["","","",""]);
  const [newVendorName, setNewVendorName] = useState("");
  // 業者スケジュール追加
  const [showVendorSchedForm, setShowVendorSchedForm] = useState(null);
  const [vendorSchedForm, setVendorSchedForm] = useState({title:"",member:"",note:"",date:today()});
  // 業務モード
  const [gyomuView, setGyomuView] = useState("list"); // list | settings | order
  const [gyomuRange, setGyomuRange] = useState("custom");
  const [gyomuWeekOffset, setGyomuWeekOffset] = useState(0);
  const [gyomuCustomStart, setGyomuCustomStart] = useState(addDays(today(),-7));  // 初期値：過去7日間
  const [gyomuCustomEnd, setGyomuCustomEnd] = useState(today());
  const [editingPrice, setEditingPrice] = useState({});
  const syncTimer = useRef(null);

  useEffect(()=>{ saveLocal(data); },[data]);
  useEffect(()=>{ saveVendors(vendors); },[vendors]);
  useEffect(()=>{ if(toast){const t=setTimeout(()=>setToast(""),2500);return()=>clearTimeout(t);} },[toast]);
  useEffect(()=>{ if(binId) pullFromCloud(binId); },[]);

  const showToast=(m,type="ok")=>{ setToast(m); setToastType(type); };

  const pullFromCloud = async (id) => {
    if(!id) return; setSyncing(true); setSyncOk(false);
    try {
      const r=await fetchBin(id);
      if(r&&r.requests){
        // 不足フィールドを補完
        if(!r.vendorMembers||Object.keys(r.vendorMembers).length===0) r.vendorMembers=DEFAULT_VENDOR_MEMBERS;
        if(!r.vendorAmounts) r.vendorAmounts={};
        if(!r.memberAssignments) r.memberAssignments={};
        if(!r.changeRequests) r.changeRequests=[];
        if(!r.vendorSchedules) r.vendorSchedules={};
        if(!r.orderStatus) r.orderStatus={};
        setData(r); saveLocal(r); setSyncOk(true);
      }
    }
    catch { showToast("取得失敗","err"); } finally { setSyncing(false); }
  };
  const pushToCloud = async (nd,id) => {
    const tid=id||binId; if(!tid) return; setSyncing(true);
    try { await updateBin(tid,nd); setSyncOk(true); }
    catch { showToast("クラウドに登録中…"); } finally { setSyncing(false); }
  };
  const setupCloud = async () => {
    setSyncing(true);
    try { const id=await createBin(data); setBinId(id); localStorage.setItem(BIN_STORAGE_KEY,id); setSyncOk(true); showToast("クラウド連携完了"); }
    catch { showToast("設定失敗","err"); } finally { setSyncing(false); }
  };
  const updateData = async (nd) => {
    setData(nd); saveLocal(nd);
    if(binId){ clearTimeout(syncTimer.current); syncTimer.current=setTimeout(()=>pushToCloud(nd,binId),800); }
  };

  // ── データ操作 ──
  const handleUpdateRequest = async (formData) => {
    // 担当者モードかつ既に割当済みの場合は変更リクエストを送る
    const isAssigned = !!data.assignments[editingRequest.id];
    const countChanged = Number(formData.count) !== Number(editingRequest.count);
    if(role==="担当者" && isAssigned && countChanged) {
      const cr = {
        id: Date.now().toString(),
        reqId: editingRequest.id,
        originalCount: editingRequest.count,
        newCount: Number(formData.count),
        newData: { ...formData, count: Number(formData.count) },
        status: "pending",
        createdAt: new Date().toISOString(),
        name: editingRequest.name,
        bukken: editingRequest.bukken,
        date: editingRequest.date,
      };
      const crs = [...(data.changeRequests||[]), cr];
      await updateData({ ...data, changeRequests: crs });
      setEditingRequest(null);
      showToast("変更リクエストを送りました。管理者の承認をお待ちください。");
    } else {
      // 未割当または管理者の場合はそのまま更新
      const updated = data.requests.map(r =>
        r.id === editingRequest.id ? { ...r, ...formData, count: Number(formData.count) } : r
      );
      await updateData({ ...data, requests: updated });
      setEditingRequest(null);
      showToast("更新しました");
    }
  };

  const handleRegister = async (formData) => {
    // 30日以上前の案件の画像を自動削除
    const thirtyDaysAgo = new Date(); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate()-30);
    const cleanedRequests = data.requests.map(r => {
      if(new Date(r.date) < thirtyDaysAgo) {
        return {...r, annaizu:"", annaizu2:""};
      }
      return r;
    });
    const req={ id:Date.now().toString(), ...formData, createdAt:new Date().toISOString(), disclosed:false };
    await updateData({...data, requests:[...cleanedRequests, req]});
    const newNames=[formData.name,...names.filter(n=>n!==formData.name)].slice(0,20);
    setNames(newNames); saveNames(newNames);
    setShowRegisterFor(null); setView("calendar"); showToast("登録しました");
  };
  const deleteRequest = async (id) => {
    if(!window.confirm("この予定を削除してもよろしいですか？")) return;
    await updateData({
      ...data,
      requests: data.requests.filter(r=>r.id!==id),
      assignments: Object.fromEntries(Object.entries(data.assignments).filter(([k])=>k!==id)),
      changeRequests: (data.changeRequests||[]).filter(cr=>cr.reqId!==id)
    });
    showToast("削除しました");
  };
  const confirmSplit = async (reqId, total) => {
    const inputs=splitInputs[reqId]||{}; const vals={}; let sum=0;
    vendors.forEach(v=>{ const n=Number(inputs[v]||0); if(n>0){vals[v]=n;sum+=n;} });
    if(!sum){ showToast("人数を入力してください","err"); return; }
    if(sum>total){ showToast(`合計${sum}人が予定${total}人超え`,"err"); return; }
    await updateData({...data, assignments:{...data.assignments,[reqId]:vals}});
    setSplitInputs(prev=>({...prev,[reqId]:undefined})); showToast("割当保存");
  };
  const clearAssignment = async (reqId) => {
    const a={...data.assignments}; delete a[reqId]; await updateData({...data,assignments:a});
  };
  const toggleDisclose = async (id) => {
    await updateData({...data, requests:data.requests.map(r=>r.id===id?{...r,disclosed:!r.disclosed}:r)});
  };

  // 単価カテゴリ管理（業者ごと）
  const addPriceCategory = (vid) => {
    if(!newCatName.trim()) return;
    const cats=getVendorCategories(vendorPriceCategories,vid);
    if(cats.includes(newCatName.trim())){ showToast("すでに存在します","err"); return; }
    const updated={...vendorPriceCategories,[vid]:[...cats,newCatName.trim()]};
    setVendorPriceCategories(updated); saveVendorPriceCategories(updated);
    setNewCatName(""); showToast("追加しました");
  };
  const deletePriceCategory = (vid, idx) => {
    const cats=getVendorCategories(vendorPriceCategories,vid);
    const updated={...vendorPriceCategories,[vid]:cats.filter((_,i)=>i!==idx)};
    setVendorPriceCategories(updated); saveVendorPriceCategories(updated); showToast("削除しました");
  };
  const renamePriceCategory = (vid, idx, name) => {
    if(!name.trim()) return;
    const cats=[...getVendorCategories(vendorPriceCategories,vid)]; cats[idx]=name.trim();
    const updated={...vendorPriceCategories,[vid]:cats};
    setVendorPriceCategories(updated); saveVendorPriceCategories(updated);
    setEditingCatIdx(null); setEditingCatName(""); showToast("変更しました");
  };

  // 金額計算ヘルパー（開示済み案件のみ）
  const calcAmount = (r, vid) => {
    if(!r.disclosed) return null;
    const a = data.assignments[r.id];
    if(!a||!a[vid]) return null;
    const cat = inferPriceCategory(r.koutei, vid);
    const priceMap = (data.unitPrices||{})[vid]||{};
    const price = priceMap[cat]||0;
    return { count: a[vid], price, total: a[vid]*price, cat };
  };

  // 業者パスワード変更
  const changeVendorPass = (vid, newPass) => {
    const updated = {...vendorPasses, [vid]: newPass};
    setVendorPasses(updated);
    saveVendorPasses(updated);
    showToast("パスワードを変更しました");
  };

  // 業者管理
  const addVendor=()=>{ if(!newVendorName.trim()||vendors.includes(newVendorName.trim()))return; setVendors([...vendors,newVendorName.trim()]); setNewVendorName(""); showToast("追加しました"); };
  const deleteVendor=(v)=>{ setVendors(vendors.filter(vv=>vv!==v)); showToast("削除しました"); };
  const moveVendor=(idx,dir)=>{ const arr=[...vendors],to=idx+dir; if(to<0||to>=arr.length)return; [arr[idx],arr[to]]=[arr[to],arr[idx]]; setVendors(arr); };

  // 業者メンバー管理
  const addVendorMember=(vid,name)=>{
    if(!name.trim()) return;
    const members=data.vendorMembers||{};
    const list=members[vid]||[];
    if(list.includes(name.trim())) return;
    updateData({...data, vendorMembers:{...members,[vid]:[...list,name.trim()]}});
  };
  const deleteVendorMember=(vid,name)=>{
    const members=data.vendorMembers||{};
    const list=(members[vid]||[]).filter(n=>n!==name);
    updateData({...data, vendorMembers:{...members,[vid]:list}});
  };

  // 業者スケジュール追加
  const addVendorSchedule = async (vid, sched) => {
    const schedules=data.vendorSchedules||{};
    const list=schedules[vid]||[];
    const newSched={id:Date.now().toString(), ...sched, createdAt:new Date().toISOString()};
    await updateData({...data, vendorSchedules:{...schedules,[vid]:[...list,newSched]}});
    showToast("スケジュールを追加しました");
  };
  const deleteVendorSchedule = async (vid, sid) => {
    const schedules=data.vendorSchedules||{};
    const list=(schedules[vid]||[]).filter(s=>s.id!==sid);
    await updateData({...data, vendorSchedules:{...schedules,[vid]:list}});
    showToast("削除しました");
  };

  // 単価設定
  const saveUnitPrice=(vid,price)=>{
    const prices=data.unitPrices||{};
    updateData({...data, unitPrices:{...prices,[vid]:Number(price)}});
    showToast("単価を保存しました");
  };

  // カレンダーデータ
  const requestsByDate={};
  data.requests.forEach(r=>{ if(!requestsByDate[r.date])requestsByDate[r.date]=[]; requestsByDate[r.date].push(r); });

  // 業務モード：実績計算
  const getGyomuRange=()=>{
    if(gyomuRange==="week") return getWeekRange(gyomuWeekOffset);
    return { start:gyomuCustomStart, end:gyomuCustomEnd };
  };
  // 工程から単価カテゴリを推定（業者ごとのカテゴリに対応）
  const inferPriceCategory = (koutei, vid) => {
    const cats = getVendorCategories(vendorPriceCategories, vid||"");
    if(!koutei) return cats[0]||"";
    if(koutei.includes("コラム")&&cats.includes("コラム")) return "コラム";
    if(koutei.includes("建て方")) {
      if((koutei.includes("手起こし")||koutei.includes("ハーフ"))&&cats.includes("ハーフ")) return "ハーフ";
      if(cats.includes("建て方")) return "建て方";
    }
    if(cats.includes("１日")) return "１日";
    return cats[0]||"";
  };

  const getGyomuData=()=>{
    const {start,end}=getGyomuRange();
    const rows=[];
    data.requests.forEach(r=>{
      if(r.date<start||r.date>end) return;
      if(!r.disclosed) return;
      const a=data.assignments[r.id];
      if(!a) return;
      Object.entries(a).forEach(([vid,cnt])=>{
        const cat=inferPriceCategory(r.koutei,vid);
        const priceMap=(data.unitPrices||{})[vid]||{};
        const unitPrice=priceMap[cat]||0;
        // 業者が入力した請求金額があればそちらを優先
        const vendorInputAmount=(data.vendorAmounts||{})[r.id]?(data.vendorAmounts[r.id][vid]||0):0;
        const price = vendorInputAmount ? vendorInputAmount : unitPrice*cnt;
        const total = vendorInputAmount ? Number(vendorInputAmount) : unitPrice*cnt;
        rows.push({ date:r.date, bukken:r.bukken||"物件名未入力", vendor:vid, count:cnt, price:vendorInputAmount||unitPrice, total, koutei:r.koutei, cat, reqId:r.id, isVendorInput:!!vendorInputAmount });
      });
    });
    rows.sort((a,b)=>a.date.localeCompare(b.date));
    return rows;
  };

  // SplitUI
  const SplitUI=({r})=>{
    const asgn=data.assignments[r.id]||{};
    const inputs=splitInputs[r.id]||{};
    const editing=splitInputs[r.id]!==undefined;
    const start=()=>setSplitInputs(p=>({...p,[r.id]:Object.fromEntries(vendors.map(v=>[v,asgn[v]?String(asgn[v]):""]))}) );
    return editing?(
      <div style={S.splitPanel}>
        <div style={S.splitHint}>予定 <b>{r.count}人</b> ／ 業者ごとの人数</div>
        {vendors.map(v=>(
          <div key={v} style={S.splitRow}>
            <span style={{...S.pill,background:vendorBg(v,vendors),color:vendorColor(v,vendors),minWidth:100,textAlign:"center",fontWeight:600}}>{v}</span>
            <input type="number" min={0} max={r.count} value={inputs[v]||""} placeholder="0"
              onChange={e=>setSplitInputs(p=>({...p,[r.id]:{...p[r.id],[v]:e.target.value}}))} style={S.numInput}/>
            <span style={S.splitUnit}>人</span>
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <button type="button" style={S.btnPrimary} onClick={()=>confirmSplit(r.id,r.count)}>確定</button>
          <button type="button" style={S.btnGhost} onClick={()=>setSplitInputs(p=>({...p,[r.id]:undefined}))}>キャンセル</button>
        </div>
      </div>
    ):(
      <button type="button" style={S.btnAssign} onClick={start}>
        {Object.keys(asgn).length>0?"✏️ 割当を変更":"＋ 業者を割り当てる"}
      </button>
    );
  };

  // ── PIN画面 ──
  if(showPin) return (
    <PinPad title={showPin==="管理者"?"管理者ログイン":"業務モード"}
      onSuccess={()=>{ setRole(showPin); setShowPin(null); setView("calendar"); }}
      onCancel={()=>setShowPin(null)}/>
  );

  // ── ロール選択 ──
  if(!role) return (
    <div style={{fontFamily:"'Noto Sans JP','Hiragino Sans',sans-serif",background:"#f7f7f8",minHeight:"100vh",maxWidth:430,margin:"0 auto",overflowX:"hidden",width:"100%"}}>
      <div style={{padding:"48px 20px 32px",display:"flex",flexDirection:"column",alignItems:"center",width:"100%",boxSizing:"border-box"}}>

        </div>
        <div style={{marginBottom:24,textAlign:"center"}}>
          <div style={{fontSize:9,fontWeight:300,letterSpacing:8,color:"#aaaaaa",marginBottom:12}}>SUMITOMO FORESTRY HE</div>
          <div style={{fontSize:24,fontWeight:300,color:"#1a1a1a",letterSpacing:"0.15em",marginBottom:8}}>建て方管理ツール</div>
          <div style={{fontSize:9,fontWeight:300,letterSpacing:4,color:"#bbbbbb"}}>KANAGAWA</div>
        </div>

        <div style={{width:"100%",maxWidth:360,marginBottom:24}}>
          <div style={{fontSize:11,color:"#888",marginBottom:10,textAlign:"center"}}>
            {binId?"● クラウド連携済み":"● クラウド未設定"}
          </div>
          {!binId&&(
            <div
              style={{display:"block",width:"100%",padding:"16px",background:"#1a1a1a",color:"#fff",borderRadius:8,fontSize:15,textAlign:"center",WebkitUserSelect:"none"}}
              onClick={()=>setupCloud()}>
              初期設定する
            </div>
          )}
          {binId&&(
            <div
              style={{display:"block",width:"100%",padding:"16px",background:"#1a1a1a",color:"#fff",borderRadius:8,fontSize:15,textAlign:"center",WebkitUserSelect:"none"}}
              onClick={()=>pullFromCloud(binId)}>
              {syncing?"取得中…":"↻ 最新データを取得"}
            </div>
          )}
        </div>

        <div style={{width:"100%",maxWidth:360,display:"flex",flexDirection:"column",gap:10}}>
          {[
            {key:"担当者",icon:"TN",desc:"予定を入力する",pin:false},
            {key:"管理者",icon:"MG",desc:"業者調整・開示（要パスワード）",pin:true,style:S.roleCardManager},
            {key:"業者",icon:"VD",desc:"スケジュール確認・入力",pin:false},
            {key:"業務",icon:"OP",desc:"発注処理・実績管理（要パスワード）",pin:true,style:S.roleCardGyomu},
          ].map(r=>(
            <button type="button" key={r.key} style={{...S.roleCard,...(r.style||{})}}
              onClick={()=>{ if(r.pin){setShowPin(r.key);}else if(r.key==="業者"){setRole("業者");}else{setRole(r.key);setView("calendar");} }}>
              <div style={{width:38,height:38,borderRadius:8,background:"#1a1a1a",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontFamily:"'Inter',sans-serif",fontSize:10,fontWeight:300,color:"#fff",letterSpacing:3}}>{r.icon}</span>
              </div>
              <div><div style={S.roleLabel}>{r.key}</div><div style={S.roleDesc}>{r.desc}</div></div>
              <span style={S.roleChev}>›</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  // ── 業者選択 ──
  if(role==="業者"&&!vendorId&&!vendorPendingId) return (
    <div style={S.root}>
      <div style={S.splash}>
        <div style={S.splashIcon}>🏢</div>
        <div style={S.splashTitle}>業者を選択</div>
        <div style={S.splashSub}>どちらの業者ですか？</div>
        <div style={S.roleSection}>
          {vendors.map(v=>(
            <button type="button" key={v} style={{...S.roleCard,borderLeft:`4px solid ${vendorColor(v,vendors)}`}}
              onClick={()=>{ setVendorPendingId(v); }}>
              <div style={{width:36,height:36,borderRadius:8,background:"#1c1c1e",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:10,fontWeight:800,color:"#fff",letterSpacing:1}}>VD</span>
              </div>
              <div><div style={{...S.roleLabel,color:vendorColor(v,vendors)}}>{v}</div></div>
              <span style={S.roleChev}>›</span>
            </button>
          ))}
        </div>
        <button type="button" style={{...S.btnGhost,marginTop:16,width:"100%"}} onClick={()=>setRole(null)}>戻る</button>
      </div>
    </div>
  );

  // ── 業者PIN認証 ──
  if(role==="業者"&&!vendorId&&vendorPendingId) {
    const correctPass = getVendorPass(vendorPasses, vendorPendingId);
    return (
      <PinPadVendor
        vendorName={vendorPendingId}
        correctPass={correctPass}
        onSuccess={()=>{ setVendorId(vendorPendingId); setVendorPendingId(null); setView("calendar"); }}
        onCancel={()=>setVendorPendingId(null)}/>
    );
  }

  // ── 業者スケジュール追加フォーム ──
  if(showVendorSchedForm) return (
    <div style={S.root}>
      <div style={S.header}>
        <div><div style={S.headerTitle}>スケジュール追加</div><div style={S.headerSub}>{vendorId}</div></div>
        <button type="button" style={S.headerBtn} onClick={()=>setShowVendorSchedForm(null)}>キャンセル</button>
      </div>
      <main style={S.main}>
        <div style={S.formCard}>
          <div style={S.formRow}>
            <label style={S.formLabel}>タイトル <span style={{color:"#ff3b30"}}>*</span></label>
            <input style={S.formInput} value={vendorSchedForm.title} onChange={e=>setVendorSchedForm(f=>({...f,title:e.target.value}))} placeholder="例：田中 休暇、〇〇現場"/>
          </div>
          <div style={S.formRow}>
            <label style={S.formLabel}>日付 <span style={{color:"#ff3b30"}}>*</span></label>
            <input style={S.formInput} type="date" value={vendorSchedForm.date} onChange={e=>setVendorSchedForm(f=>({...f,date:e.target.value}))}/>
          </div>
          <div style={S.formRow}>
            <label style={S.formLabel}>担当メンバー</label>
            <select style={S.formInput} value={vendorSchedForm.member} onChange={e=>setVendorSchedForm(f=>({...f,member:e.target.value}))}>
              <option value="">─ 選択（任意）─</option>
              {(data.vendorMembers[vendorId]||[]).map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div style={S.formRow}>
            <label style={S.formLabel}>備考</label>
            <input style={S.formInput} value={vendorSchedForm.note} onChange={e=>setVendorSchedForm(f=>({...f,note:e.target.value}))} placeholder="メモ"/>
          </div>
          <button type="button" style={{...S.btnPrimary,width:"100%",marginTop:16,padding:"14px"}} onClick={async()=>{
            if(!vendorSchedForm.title||!vendorSchedForm.date){showToast("タイトルと日付は必須です","err");return;}
            await addVendorSchedule(vendorId,vendorSchedForm);

                {pendingCount>0&&(

                    setCurrentYM(dates[0]?dates[0].slice(0,7):currentYM);
                    setView("calendar");

                            onSave={(reqId,members)=>{

                              ma[reqId]={...(ma[reqId]||{}),[vid]:members};

                          r.id===cr.reqId ? {...r, ...cr.newData} : r
                        );
                        const updatedAssigns = {...data.assignments};
                        delete updatedAssigns[cr.reqId];
                        const updatedCRs = (data.changeRequests||[]).map(c =>
                          c.id===cr.id ? {...c, status:"approved"} : c
                        );
                        await updateData({...data, requests:updatedReqs, assignments:updatedAssigns, changeRequests:updatedCRs});
                        showToast("承認しました。再割当してください。");
                      }}>✓ 承認</button>
                      <button type="button" style={{...S.btnGhost,padding:"6px 14px",fontSize:13,color:"#ff3b30"}} onClick={async()=>{
                        const updatedCRs = (data.changeRequests||[]).map(c =>
                          c.id===cr.id ? {...c, status:"rejected"} : c

                        await updateData({...data, changeRequests:updatedCRs});

                    </div>
                  </div>

              </div>

            <div style={S.sectionLabel}>未割当 {data.requests.filter(r=>!data.assignments[r.id]).length}件</div>
            {data.requests.filter(r=>!data.assignments[r.id]).map(r=>(
              <div key={r.id} style={{...S.reqCard,borderLeftColor:"#ff9500"}}>

                    {r.koutei&&<div style={S.kouteiChip}>{r.koutei}</div>}

                      <div style={S.reqMeta}>👷 {r.count}人{r.tsubo?`　${r.tsubo}`:""}{r.floors?`　${r.floors}階`:""}</div>
